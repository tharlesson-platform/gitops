apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-api
spec:
  rules:
    - host: sample-api.stage.platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-api
                port:
                  name: http
