apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-worker
  labels:
    app.kubernetes.io/name: sample-worker
    app.kubernetes.io/part-of: sample-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-worker
        app.kubernetes.io/part-of: sample-platform
    spec:
      containers:
        - name: sample-worker
          image: ghcr.io/example-org/sample-worker:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sample-worker-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
